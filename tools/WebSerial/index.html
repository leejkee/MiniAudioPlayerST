<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSerial — MiniAudioPlayerST</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>MiniAudioPlayerST — Serial Monitor</h1>
    <span id="status" class="status-disconnected">DISCONNECTED</span>
  </header>

  <div id="toolbar">
    <button id="btn-connect">Connect</button>
    <button id="btn-clear" disabled>Clear</button>
    <label>
      Baud:
      <select id="baudrate">
        <option value="9600">9600</option>
        <option value="19200">19200</option>
        <option value="38400">38400</option>
        <option value="57600">57600</option>
        <option value="115200" selected>115200</option>
        <option value="230400">230400</option>
        <option value="460800">460800</option>
        <option value="921600">921600</option>
      </select>
    </label>
    <label class="checkbox-label">
      <input type="checkbox" id="autoscroll" checked>
      Auto-scroll
    </label>
    <label class="checkbox-label">
      <input type="checkbox" id="timestamps">
      Timestamps
    </label>
  </div>

  <pre id="output"></pre>

  <div id="input-bar">
    <input type="text" id="send-input" placeholder="Type message, press Enter to send…" disabled>
    <button id="btn-send" disabled>Send</button>
    <span id="footer-info">Rx: 0 | Tx: 0</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
